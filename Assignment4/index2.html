<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>What's Shakin?</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <!--      Mapbox JS initialization-->
    <link
      href="https://api.tiles.mapbox.com/mapbox-gl-js/v3.22.0/mapbox-gl.css"
      rel="stylesheet"
    />
    <script src="https://api.tiles.mapbox.com/mapbox-gl-js/v3.22.0/mapbox-gl.js"></script>
<!--    style!-->
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
    </style>
  </head>
<!--  content-->
  <body>
    <div id="map"></div>
    <script>
      mapboxgl.accessToken =
        'pk.eyJ1IjoiYmVuYWxkcjMiLCJhIjoiY21uaHg5YnIyMDdlbzJycTRtY2R2aGRrYyJ9.sqoJ4mnoaaRnjwBUMLJitw';

      const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/benaldr3/cmohrnmr7000201si2idf9ntk',
        center: [190, 35],
        zoom: 2,
      });
      const nav = new mapboxgl.NavigationControl({
        visualizePitch: true,
      });
      map.addControl(nav, 'top-left');
    </script>
  </body>
</html>
