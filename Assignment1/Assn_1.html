<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Assignment 1: Mapbox + HTML Starter | Ben Aldrich</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>

    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->
    <link
      href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css"
      rel="stylesheet"
    />

    <style>
      /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      #banner {
        z-index: 9999;
        background-color: rgb(234 234 234 / 0.5);
        opacity: 80%;
        text-align: center;
        font-family:
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Helvetica,
          Arial,
          sans-serif;
        color: #071423;
        padding: 10px 5px;
      }
    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
    <div id="map"></div>
    <!--  Insert the title div here (part VI) -->
    <div id="banner">
      <h1>My Map of Portland!</h1>
      <h2>By: Ben Aldrich</h2>
    </div>

    <script>
      // Insert the JavaScript within the <script> tags, within the body
      // Start with the Mapbox access token here (Part 2.1)
      mapboxgl.accessToken =
        'pk.eyJ1IjoiYmVuYWxkcjMiLCJhIjoiY21uaHg5YnIyMDdlbzJycTRtY2R2aGRrYyJ9.sqoJ4mnoaaRnjwBUMLJitw';

      const map = new mapboxgl.Map({
        container: 'map',
        // Choose from Mapbox's core styles, or make your own style with Mapbox Studio
        style: 'mapbox://styles/mapbox/standard',
        config: {
          basemap: {
            theme: 'faded',
            lightingPreset: 'night',
            showLandmarkIcons: true,
            show3dFacades: true,
          }
        },
        zoom: 11,
        center: [-122.6788, 45.5212]
      });
      // Then initialize the map here (Part 2.2)
      // var map = new mapboxgl.Map({
      //   container: 'map', // id of a div on your page, where the map will be inserted
      //   style: 'mapbox://styles/mapbox/navigation-day-v1', // stylesheet location
      //   center: [-122.6788, 45.5212], // starting position [lng, lat] eg. [-122.6788, 45.5212]
      //   zoom: 11, // starting zoom
      // });

      // Add the zoom controls here (part V)
      map.addControl(
        new mapboxgl.NavigationControl({
          showCompass: false,
        }),
        'bottom-left',
      );

      // Add popups for markers here. Yes, before the markers!  (part IV)
      var popup = new mapboxgl.Popup({
        offset: 25,
      }).setHTML(
        'Hello World! Welcome to Downtown Portland. I made this map to demonstrate basic HTML and mapbox skills!',
      );

      var popup2 = new mapboxgl.Popup({
        offset: 25,
      }).setHTML("Powell's City of Books! I love going here on a rainy day to find a great new read.");

      // Add any other variables such as markers here (part III)
      var marker = new mapboxgl.Marker({
        color: 'red',
      })
        .setLngLat([-122.6788, 45.5212]) // starting position [lng, lat],
        .setPopup(popup) // reference above defined 'popup' var
        .addTo(map);

      var marker2 = new mapboxgl.Marker({
        color: 'blue',
      })
        .setLngLat([-122.6814, 45.5232])
        .setPopup(popup2)
        .addTo(map);

      var popup_layer = new mapboxgl.Popup({
        closeOnClick: true,
        anchor: 'top-right',
      })
        .setLngLat([-122.64, 45.5]) //popup coordinates
        .setHTML('<h1>Hi Portland! Right (or option) click to pan around and see the cool 3d buildings 🏙️</h1>') //popup text
        .addTo(map); //add this popup to the map!

      var popup_layer_voodoo = new mapboxgl.Popup({
        closeOnClick: true,
        anchor: 'top-left',
      })
        .setLngLat([-122.6814, 45.5232])
        .setHTML(
          '<a href="https://www.powells.com">Powell\'s books, a Portland classic!</a>',
        )
        .addTo(map);

  // Add optional advanced "On load" function here

</script>

</body>

</html>
